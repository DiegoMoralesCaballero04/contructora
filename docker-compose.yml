version: '3.8'

services:
  # ── Django + Gunicorn ─────────────────────────────────────────
  django:
    build:
      context: .
      dockerfile: docker/django/Dockerfile
    container_name: construtech_django
    env_file: .env
    ports:
      - '8000:8000'
    volumes:
      - .:/app
    depends_on:
      postgres:
        condition: service_healthy
      mongodb:
        condition: service_started
      redis:
        condition: service_started
    restart: unless-stopped
    command: >
      sh -c "mkdir -p /app/media/erp/factures &&
             python manage.py migrate --noinput &&
             python manage.py compilemessages --ignore=.venv &&
             python manage.py collectstatic --noinput &&
             python manage.py init_roles &&
             gunicorn config.wsgi:application --bind 0.0.0.0:8000 --workers 3 --timeout 90 --reload"

  # ── Celery Worker ─────────────────────────────────────────────
  celery-worker:
    build:
      context: .
      dockerfile: docker/django/Dockerfile
    container_name: construtech_celery
    env_file: .env
    volumes:
      - .:/app
    depends_on:
      - django
      - redis
    restart: unless-stopped
    command: celery -A config.celery worker --loglevel=info --concurrency=2

  # ── Celery Beat (scheduler) ───────────────────────────────────
  celery-beat:
    build:
      context: .
      dockerfile: docker/django/Dockerfile
    container_name: construtech_beat
    env_file: .env
    volumes:
      - .:/app
    depends_on:
      - django
      - redis
    restart: unless-stopped
    command: celery -A config.celery beat --loglevel=info --scheduler django_celery_beat.schedulers:DatabaseScheduler

  # ── PostgreSQL ────────────────────────────────────────────────
  postgres:
    image: postgres:16
    container_name: construtech_postgres
    env_file: .env
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}']
      interval: 10s
      retries: 5
    restart: unless-stopped

  # ── MongoDB ───────────────────────────────────────────────────
  mongodb:
    image: mongo:7
    container_name: construtech_mongodb
    ports:
      - '27017:27017'
    volumes:
      - mongo_data:/data/db
    restart: unless-stopped

  # ── Redis ─────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: construtech_redis
    ports:
      - '6379:6379'
    restart: unless-stopped

  # ── Ollama (LLM local) ────────────────────────────────────────
  ollama:
    image: ollama/ollama:latest
    container_name: construtech_ollama
    ports:
      - '11434:11434'
    volumes:
      - ollama_data:/root/.ollama
    # Descomenta per a GPU NVIDIA:
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - capabilities: [gpu]
    restart: unless-stopped

  # ── n8n (workflow orchestration) ─────────────────────────────
  n8n:
    image: n8nio/n8n:latest
    container_name: construtech_n8n
    ports:
      - '5678:5678'
    environment:
      - N8N_HOST=localhost
      - WEBHOOK_URL=http://localhost:5678/
      - NODE_ENV=production
      - CONSTRUTECH_API_KEY=${API_KEY}
      - TELEGRAM_CHAT_ID=${TELEGRAM_CHAT_ID}
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
      - N8N_BLOCK_ENV_ACCESS_IN_NODE=false
    volumes:
      - n8n_data:/home/node/.n8n
      - ./n8n/workflows:/workflows:ro
      - ./n8n/credentials:/credentials:ro
    depends_on:
      - django
    restart: unless-stopped

  # ── Nginx (proxy) ─────────────────────────────────────────────
  nginx:
    build:
      context: .
      dockerfile: docker/nginx/Dockerfile
    container_name: construtech_nginx
    ports:
      - '80:80'
    volumes:
      - ./staticfiles:/app/staticfiles:ro
      - ./media:/app/media:ro
      - ./docker/nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - django
    restart: unless-stopped

volumes:
  postgres_data:
  mongo_data:
  ollama_data:
  n8n_data:
